{# templates/edit_profile.html #}
{% extends "base.html" %}

{% block title %}Edit Profile — Spendly{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/edit_profile.css') }}">
{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Edit Profile</h1>
            <p class="auth-subtitle">Update your name, email, or password</p>
       </div>
        <div class="auth-card">
            <form action="{{ url_for('edit_profile') }}" method="POST" novalidate>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input id="name" name="name" type="text" class="form-input"
                           value="{{ form.name }}" required maxlength="80"
                           autocomplete="name">
               </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" class="form-input"
                           value="{{ form.email }}" required
                           autocomplete="email">
               </div>

                <div class="form-group">
                    <label for="current_password">Current password</label>
                    <input id="current_password" name="current_password"
                           type="password" class="form-input" required
                           autocomplete="current-password">
                    <small class="form-hint">Required to confirm any change</small>
               </div>

                <div class="form-divider</div>

                <div class="form-group">
                    <label for="new_password">
                        New password <span class="form-optional">(optional</span>
                   </label>
                    <input id="new_password" name="new_password"
                           type="password" class="form-input"
                           minlength="6" autocomplete="new-password">
               </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm new password</label>
                    <input id="confirm_password" name="confirm_password"
                           type="password" class="form-input"
                           minlength="6" autocomplete="new-password">
               </div>

                <button type="submit" class="btn-submit">Save Changes</button>
                <div class="auth-switch">
                    <a href="{{ url_for('profile') }}">← Back to profile</a>
               </div>
           </form>
       </div>
   </div>
</section>
{% endblock %}
